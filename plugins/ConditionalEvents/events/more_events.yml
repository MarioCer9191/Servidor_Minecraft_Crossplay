Events:
  auto_grupo_forastero:
    type: player_join
    conditions:
      - '%luckperms_primary_group% == default'
      - '%conditionalevents_playerdata_has:forastero_asignado% == no'
    actions:
    default:
      - 'console_command: lp user %player% parent add forastero'
      - 'message: &6[La Odisea] &aBienvenido, Forastero. Tu viaje comienza ahora.'
      - 'playerdata_set: forastero_asignado true'
