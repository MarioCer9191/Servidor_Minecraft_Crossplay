# NEVER DELETE A %variable%
# Messages support HEX colours codes.

player_help: |
  &6&nComandos para jugadores:
  &e/dq me &7→ &aVer tus misiones activas
  &e/dq reroll <índice> &7→ &aCambiar una misión (requiere permiso)
  &e/dq show <easy/medium/hard> &7→ &aVer misiones por categoría
admin_help: |
  &c&nComandos para administradores:
  &e/dqa complete <jugador> <índice> &7→ &aCompleta una misión manualmente
  &e/dqa customcomplete <jugador> <tipo> <cantidad> &7→ &aCompleta una misión personalizada
  &e/dqa reset <quests/total> <jugador> &7→ &aReinicia misiones o progreso
  &e/dqa add total <jugador> <cantidad> &7→ &aAgrega misiones completadas
  &e/dqa reroll <jugador> <índice> &7→ &aCambia una misión específica
  &e/dqa show <jugador> &7→ &aVer misiones de un jugador
